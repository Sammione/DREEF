services:
  - type: web
    name: drfeer-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend --timeout-keep-alive 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SHAREPOINT_SITE_URL
        sync: false
      - key: SHAREPOINT_CLIENT_ID
        sync: false
      - key: SHAREPOINT_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: DB_CONNECTION_STRING
        sync: false
